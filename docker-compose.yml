version: "3.9"

services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sales-summarizer-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - GEMINI_API_KEY=AIzaSyA1yfWZzDCCF_xjjTOSoIvshqkdBzZGquQ
      - EMAIL_SERVICE=gmail
      - EMAIL_USER=madhavaneja24@gmail.com
      - EMAIL_PASS=hexkncfvocsmhtrb
      - API_BASE_URL=http://localhost:5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  # ─── Frontend SPA ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: sales-summarizer-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

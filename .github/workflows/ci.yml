name: CI — Build & Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ─── Backend: Lint + Build ───────────────────────────────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Smoke test (start server)
        run: |
          GEMINI_API_KEY=test \
          EMAIL_USER=test@test.com \
          EMAIL_PASS=testpass \
          timeout 10 node src/server.js &
          sleep 5
          curl -f http://localhost:5000/api/health || exit 1

  # ─── Frontend: Lint + Build ──────────────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

      - name: Verify build output
        run: ls -la dist/

  # ─── Docker: Build images ────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sales-summarizer-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sales-summarizer-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max
